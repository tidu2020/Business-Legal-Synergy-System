<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务工作台 · 业法协同系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .mode-toggle { display:flex; gap:0; border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:12px; }
        .mode-toggle button { flex:1; padding:10px 16px; border:none; background:#f5f5f5; cursor:pointer; font-size:14px; transition:all .2s; }
        .mode-toggle button.active { background:var(--primary,#2563eb); color:#fff; }
        .upload-inline { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
        .upload-inline input[type=file] { flex:1; font-size:13px; }
        .material-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
        .material-chip { background:#e0f2fe; border:1px solid #bae6fd; border-radius:12px; padding:2px 10px; font-size:12px; color:#0369a1; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">业法协同系统 <span class="sub">业务工作台</span></div>
        <div class="user-info">
            <span id="userName"></span>
            <span class="role-tag">业务</span>
            <button class="logout" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="orders">我的工单</div>
            <div class="nav-item" data-tab="assistant">智能助手</div>
        </div>

        <div class="main">
            <!-- 我的工单（侧栏第一位） -->
            <div id="tab-orders" class="tab-pane">
                <div class="card">
                    <div class="card-title">我提交的工单</div>
                    <table id="ordersTable">
                        <thead>
                            <tr>
                                <th>工单号</th><th>提交时间</th>
                                <th>状态</th><th>法务审核人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 智能助手（咨询模式 + 合同审核模式合并） -->
            <div id="tab-assistant" class="tab-pane hidden">
                <div class="card">
                    <div class="card-title">智能助手</div>
                    <p style="color:var(--text-light);font-size:13px;margin-bottom:12px">
                        咨询模式：提问 + 可选上传材料作为辅助上下文；
                        合同审核模式：上传合同文件，执行六阶段审核并生成报告。
                    </p>

                    <!-- 模式切换 -->
                    <div class="mode-toggle">
                        <button id="modeConsult" class="active" onclick="switchMode('consult')">咨询模式</button>
                        <button id="modeContract" onclick="switchMode('contract')">合同审核模式</button>
                    </div>

                    <!-- 咨询模式 -->
                    <div id="paneConsult">
                        <div class="chat-area" id="chatArea">
                            <div class="empty">暂无对话。请在下方输入问题开始咨询。</div>
                        </div>
                        <div class="form-group">
                            <textarea id="questionInput" rows="3"
                                placeholder="例如：合同相对方要求第三方付款可以吗？（Ctrl+Enter 发送）"></textarea>
                        </div>
                        <!-- 内联上传材料 -->
                        <div class="upload-inline">
                            <input type="file" id="fileInput" accept=".txt,.docx,.md">
                            <button class="btn btn-secondary btn-sm" onclick="uploadFile()">上传辅助材料</button>
                            <label style="font-size:13px;color:var(--text-light);display:flex;align-items:center;gap:6px;cursor:pointer">
                                <input type="checkbox" id="withMaterials" style="margin:0">
                                合并已上传材料作为上下文
                            </label>
                        </div>
                        <div class="material-chips" id="materialChips"></div>
                        <div class="toolbar">
                            <div class="spacer"></div>
                            <button class="btn" onclick="askQuestion()">发送咨询</button>
                            <button class="btn btn-secondary" onclick="closeSession()">仅参考，结束</button>
                            <button class="btn btn-danger" onclick="submitToLegal()">提交法务处理</button>
                        </div>
                    </div>

                    <!-- 合同审核模式 -->
                    <div id="paneContract" style="display:none">
                        <p style="color:var(--text-light);font-size:13px;margin-bottom:8px">
                            上传合同文件后，点击"启动审核"执行六阶段流水线（提取 → 检索 → 业务/法律审查 → 法条核验 → 报告生成），
                            完成后可下载 Markdown 报告并继续多轮问答。
                        </p>
                        <div class="toolbar">
                            <input type="file" id="contractFile" accept=".txt,.docx,.md" style="flex:1">
                            <button class="btn" onclick="uploadContract()">上传合同</button>
                            <button class="btn btn-secondary" onclick="clearContract()">清空</button>
                        </div>
                        <div id="contractInfo" style="margin-top:12px"></div>
                        <div class="form-group" style="margin-top:12px">
                            <label>特别关注（可选）</label>
                            <input type="text" id="contractFocus" placeholder="如：违约责任、付款方式、知识产权归属">
                        </div>
                        <div class="form-group">
                            <label>审核立场</label>
                            <select id="contractStance">
                                <option value="auto">自动识别</option>
                                <option value="甲方">甲方</option>
                                <option value="乙方">乙方</option>
                                <option value="中立">中立</option>
                            </select>
                        </div>
                        <div class="toolbar">
                            <button class="btn" onclick="runContractReview()">启动审核</button>
                            <button class="btn btn-secondary" id="downloadReportBtn" onclick="downloadReport()" disabled>下载报告</button>
                            <span id="contractStatus" style="margin-left:auto;color:var(--text-light);font-size:13px"></span>
                        </div>
                        <div class="chat-area" id="contractChat" style="margin-top:16px">
                            <div class="empty">请先上传合同，然后启动审核。</div>
                        </div>
                        <div class="form-group">
                            <textarea id="contractQuestion" rows="3"
                                placeholder="审核完成后，可在此针对合同细节继续提问（Ctrl+Enter 发送）。"></textarea>
                        </div>
                        <div class="toolbar">
                            <button class="btn" onclick="askContract()">发送追问</button>
                            <button class="btn btn-secondary" onclick="resetContractChat()">重置对话</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/common.js"></script>
    <script>
        let currentUser = null;

        (async () => {
            currentUser = await requireLogin();
            if (!currentUser) return;
            if (currentUser.role !== 'business') {
                redirectByRole(currentUser.role);
                return;
            }
            document.getElementById('userName').textContent = currentUser.name;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.onclick = () => switchTab(item.dataset.tab);
            });
            loadOrders();
            loadSession();
        })();

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i =>
                i.classList.toggle('active', i.dataset.tab === tab));
            document.querySelectorAll('.tab-pane').forEach(p =>
                p.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if (tab === 'orders') loadOrders();
            if (tab === 'assistant') loadSession();
        }

        // ---------- 模式切换 ----------
        function switchMode(mode) {
            const isConsult = mode === 'consult';
            document.getElementById('modeConsult').classList.toggle('active', isConsult);
            document.getElementById('modeContract').classList.toggle('active', !isConsult);
            document.getElementById('paneConsult').style.display = isConsult ? '' : 'none';
            document.getElementById('paneContract').style.display = isConsult ? 'none' : '';
        }

        // ---------- 智能咨询 ----------
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const q = input.value.trim();
            if (!q) { toast('请输入问题', 'warning'); return; }

            const withMaterials = document.getElementById('withMaterials').checked;
            const chatArea = document.getElementById('chatArea');
            if (chatArea.querySelector('.empty')) chatArea.innerHTML = '';
            chatArea.innerHTML += `<div class="chat-msg user"><div class="role">我</div>${escapeHtml(q)}</div>`;
            input.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await API.post('/api/business/consult', {
                    question: q,
                    with_materials: withMaterials
                });
                const relTag = {
                    'high': '<span style="color:#16a34a">● 高相关度（知识库+LLM优化，已标注原文）</span>',
                    'mid':  '<span style="color:#d97706">● 中相关度（参考知识库+LLM）</span>',
                    'low':  '<span style="color:#6b7280">● 大模型兜底（未用知识库）</span>',
                    'none': '<span style="color:#6b7280">● 大模型兜底（未用知识库）</span>'
                }[res.relevance] || '';
                const modeNote = res.mode === 'rag' && res.relevance !== 'low' && res.relevance !== 'none'
                    ? '<span style="color:#6b7280;font-size:12px">（LLM未启用，使用知识库原文）</span>'
                    : '';
                const isNoKnowledge = res.relevance === 'none' && (!res.sources || !res.sources.length);
                const disclaimer = res.disclaimer ? `<div style="margin-top:4px;font-size:12px;color:var(--text-light)">${escapeHtml(res.disclaimer)}</div>` : '';
                let html = `<div class="chat-msg ai"><div class="role">AI 助手</div><div style="white-space:pre-wrap">${escapeHtml(res.answer)}</div>`;
                if (relTag) html += `<div style="margin-top:6px;font-size:12px">${relTag}</div>`;
                if (modeNote) html += `<div style="font-size:12px">${modeNote}</div>`;
                if (isNoKnowledge) {
                    html += `<div style="margin-top:12px;padding:12px;background:#fef3c7;border-radius:8px;font-size:13px;color:#92400e">
                        <strong>建议：</strong>当前知识库暂无高相关度内容，建议直接<button class="btn btn-primary" onclick="submitToLegal()" style="margin:0 4px;font-size:12px">提交法务处理</button>获取正式法律意见。
                    </div>`;
                }
                html += disclaimer;
                if (res.sources && res.sources.length) {
                    html += '<div style="margin-top:12px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0">';
                    html += '<div style="font-weight:600;margin-bottom:8px;color:#334155">📚 知识库参考案例（请标记是否相关）</div>';
                    res.sources.forEach(s => {
                        html += `<div class="ref-item" data-faq-id="${s.id}" style="margin-bottom:6px">
                            <span class="ref-score" style="background:#e8f5e9;color:#16a34a">${(s.score*100).toFixed(0)}%</span>
                            <a href="javascript:void(0)" onclick="viewSource('${s.id}')" style="color:#2563eb;flex:1">[${s.id}] ${escapeHtml(s.question)}</a>
                            <span style="display:flex;gap:4px;flex-shrink:0">
                                <button class="btn btn-sm" onclick="feedback('${s.id}',true,this)" style="background:#e8f5e9;border-color:#16a34a;color:#16a34a">✓ 有关</button>
                                <button class="btn btn-sm" onclick="feedback('${s.id}',false,this)" style="background:#fef3c7;border-color:#d97706;color:#d97706">✗ 无关</button>
                            </span>
                        </div>`;
                    });
                    html += '</div>';
                }
                html += '</div>';
                chatArea.innerHTML += html;
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function viewSource(faqId) {
            try {
                const item = await API.get(`/api/ai/sources/${faqId}`);
                let html = `<h3>知识库条目 ${item.id}</h3>`;
                html += `<p><strong>问题：</strong>${escapeHtml(item.question||'')}</p>`;
                html += `<p><strong>法律解答：</strong>${escapeHtml(item.legal_answer||'')}</p>`;
                if (item.compliance_risk) html += `<p><strong>合规风险：</strong>${escapeHtml(item.compliance_risk)}</p>`;
                if (item.practical_advice) html += `<p><strong>实务建议：</strong>${escapeHtml(item.practical_advice)}</p>`;
                if (item.legal_basis) html += `<p><strong>法律依据：</strong>${escapeHtml(item.legal_basis)}</p>`;
                if (item.tags && item.tags.length) html += `<p><strong>标签：</strong>${item.tags.map(escapeHtml).join(', ')}</p>`;
                showModal(html);
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function feedback(faqId, relevant, btn) {
            try {
                await API.post('/api/ai/feedback', { faq_id: faqId, relevant });
                toast(relevant ? '已标记为"有关"' : '已标记为"无关"', 'success');
                const parent = btn.closest('.ref-item');
                if (parent) {
                    parent.querySelectorAll('button').forEach(b => b.disabled = true);
                }
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function loadSession() {
            try {
                const s = await API.get('/api/business/session');
                const chatArea = document.getElementById('chatArea');
                if (!s.dialogue || s.dialogue.length === 0) {
                    chatArea.innerHTML = '<div class="empty">暂无对话。请在上方输入问题开始咨询。</div>';
                } else {
                    chatArea.innerHTML = s.dialogue.map(d => {
                        const role = { user: '我', ai: 'AI 助手' }[d.role] || d.role;
                        const cls = d.role === 'user' ? 'user' : 'ai';
                        return `<div class="chat-msg ${cls}"><div class="role">${role}</div>${escapeHtml(d.content)}</div>`;
                    }).join('');
                    chatArea.scrollTop = chatArea.scrollHeight;
                }
                renderMaterials(s.materials || []);
            } catch { /* 无活跃会话，忽略 */ }
        }

        function renderMaterials(materials) {
            const el = document.getElementById('materialChips');
            if (!materials.length) {
                el.innerHTML = '';
                return;
            }
            el.innerHTML = materials.map(m =>
                `<span class="material-chip" title="${escapeHtml(m.filename)}">${escapeHtml(m.filename)} (${m.size}字)</span>`
            ).join('');
        }

        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (!input.files.length) { toast('请选择文件', 'warning'); return; }
            const fd = new FormData();
            fd.append('file', input.files[0]);
            try {
                const res = await API.upload('/api/business/upload', fd);
                toast(`已上传 ${res.filename}（${res.size} 字）`);
                input.value = '';
                loadSession();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function closeSession() {
            if (!confirm('确认结束本次咨询？结束后需重新提问。')) return;
            try {
                const s = await API.get('/api/business/session');
                await API.post(`/api/business/sessions/${s.id}/close`);
                toast('已结束会话');
                loadSession();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function submitToLegal() {
            if (!confirm('确认提交法务处理？提交后法务将审核您的咨询和材料。')) return;
            try {
                const res = await API.post('/api/business/submit_order', {});
                toast(`已提交法务，工单号 ${res.order_id}`, 'success');
                loadSession();
                loadOrders();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        // ---------- 我的工单 ----------
        async function loadOrders() {
            try {
                const orders = await API.get('/api/business/my_orders');
                const body = document.getElementById('ordersBody');
                if (!orders.length) {
                    body.innerHTML = '<tr><td colspan="5" class="empty">暂无工单</td></tr>';
                    return;
                }
                body.innerHTML = orders.map(o => {
                    const canWithdraw = o.status === 'submitted_to_legal';
                    const actions = `<button class="btn btn-sm" onclick="viewOrder('${o.id}')">查看</button>`
                        + (canWithdraw ? ` <button class="btn btn-sm btn-danger" onclick="withdrawOrder('${o.id}')">撤回</button>` : '');
                    return `
                    <tr>
                        <td>${o.id}</td>
                        <td>${fmtTime(o.submitted_at)}</td>
                        <td>${statusTag(o.status)}</td>
                        <td>${escapeHtml(o.reviewer_name || '-')}</td>
                        <td>${actions}</td>
                    </tr>`;
                }).join('');
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function viewOrder(id) {
            try {
                const o = await API.get(`/api/business/orders/${id}`);
                let html = `<h3>工单 ${o.id}</h3>`;
                html += `<p><strong>状态：</strong>${statusTag(o.status)}</p>`;
                html += `<p><strong>提交时间：</strong>${fmtTime(o.submitted_at)}</p>`;
                if (o.reviewer_name) html += `<p><strong>法务审核人：</strong>${escapeHtml(o.reviewer_name)}</p>`;
                html += `<p><strong>材料数：</strong>${o.materials.length} 份</p>`;
                // 已读/已确认状态展示
                if (o.status === 'confirmed') {
                    if (o.business_confirmed_at) {
                        html += '<div class="disclaimer" style="background:#d1fae5;color:#065f46">您已确认审核结果，等待法务归档。</div>';
                    } else if (o.business_read_at) {
                        html += `<div class="disclaimer" style="background:#fef3c7;color:#92400e">已读（${fmtTime(o.business_read_at)}），请确认审核结果或提出新问题。</div>`;
                    } else {
                        html += '<div class="disclaimer" style="background:#dbeafe;color:#1e40af">法务已反馈，请查看下方结论并确认或追加问题。</div>';
                    }
                }
                html += '<h4 style="margin-top:16px">咨询对话</h4>';
                o.dialogue.forEach(d => {
                    const role = { user: '业务', ai: 'AI', legal: '法务' }[d.role] || d.role;
                    html += `<div class="chat-msg ${d.role === 'user' ? 'user' : 'ai'}"><div class="role">${role}</div>${escapeHtml(d.content)}</div>`;
                });
                if (o.legal_conclusion) {
                    html += '<h4 style="margin-top:16px">法务结论</h4>';
                    html += `<div class="chat-msg ai">${escapeHtml(o.legal_conclusion)}</div>`;
                }
                // 业务确认/提新问题按钮（仅 confirmed 且未确认时）
                if (o.status === 'confirmed' && !o.business_confirmed_at) {
                    html += '<h4 style="margin-top:16px">操作</h4>';
                    html += `<div class="toolbar">
                        <button class="btn" onclick="businessConfirmOrder('${o.id}')">确认审核结果</button>
                        <button class="btn btn-secondary" onclick="showAskMoreBox('${o.id}')">提出新问题</button>
                    </div>`;
                    html += `<div id="askMoreBox" style="display:none;margin-top:8px">
                        <textarea id="askMoreQ" rows="3" placeholder="请输入追加的问题..." style="width:100%"></textarea>
                        <div class="toolbar" style="margin-top:4px">
                            <button class="btn btn-sm" onclick="businessAskMore('${o.id}')">提交新问题</button>
                            <button class="btn btn-sm btn-secondary" onclick="document.getElementById('askMoreBox').style.display='none'">取消</button>
                        </div>
                    </div>`;
                }
                showModal(html);
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function businessConfirmOrder(id) {
            if (!confirm('确认审核结果？确认后法务可归档，您将无法再追加问题。')) return;
            try {
                await API.post(`/api/business/orders/${id}/confirm`);
                toast('已确认审核结果', 'success');
                closeModal();
                loadOrders();
            } catch (e) { toast(e.message, 'error'); }
        }

        function showAskMoreBox(id) {
            document.getElementById('askMoreBox').style.display = 'block';
            document.getElementById('askMoreQ').focus();
        }

        async function businessAskMore(id) {
            const q = document.getElementById('askMoreQ').value.trim();
            if (!q) { toast('请输入问题', 'warning'); return; }
            try {
                await API.post(`/api/business/orders/${id}/ask_more`, { question: q });
                toast('已提交新问题，工单回到审核中', 'success');
                closeModal();
                loadOrders();
            } catch (e) { toast(e.message, 'error'); }
        }

        function showModal(html) {
            const mask = document.createElement('div');
            mask.className = 'modal-mask';
            mask.innerHTML = `<div class="modal">${html}<div style="margin-top:16px;text-align:right"><button class="btn" onclick="closeModal()">关闭</button></div></div>`;
            mask.onclick = e => { if (e.target === mask) mask.remove(); };
            document.body.appendChild(mask);
        }

        function closeModal() {
            const mask = document.querySelector('.modal-mask');
            if (mask) mask.remove();
        }

        async function withdrawOrder(id) {
            if (!confirm('确认撤回该工单？撤回后法务将不再处理。')) return;
            try {
                await API.post(`/api/business/orders/${id}/withdraw`);
                toast('已撤回', 'success');
                loadOrders();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        // 回车发送
        document.getElementById('questionInput').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') askQuestion();
        });

        // ---------- 合同审核 ----------
        let contractSessionId = '';
        let contractHistory = [];

        function setContractStatus(text, color = 'var(--text-light)') {
            const el = document.getElementById('contractStatus');
            if (el) {
                el.style.color = color;
                el.textContent = text;
            }
        }

        async function uploadContract() {
            const input = document.getElementById('contractFile');
            if (!input.files.length) { toast('请选择合同文件', 'warning'); return; }
            const fd = new FormData();
            fd.append('file', input.files[0]);
            setContractStatus('上传中...');
            try {
                const res = await API.upload('/api/file_review/upload', fd);
                contractSessionId = res.session_id;
                contractHistory = [];
                document.getElementById('contractInfo').innerHTML =
                    `<div style="padding:8px 12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:4px">
                        已加载合同：<strong>${escapeHtml(res.filename)}</strong>（${res.char_count} 字）
                        <div style="margin-top:4px;color:var(--text-light);font-size:12px">预览：${escapeHtml(res.preview)}</div>
                    </div>`;
                document.getElementById('contractChat').innerHTML =
                    '<div class="empty">合同已上传，可填写关注点与立场后点击"启动审核"。</div>';
                document.getElementById('downloadReportBtn').disabled = true;
                setContractStatus('就绪，等待启动审核', '#16a34a');
                toast('合同上传成功', 'success');
            } catch (e) {
                setContractStatus('上传失败', '#dc2626');
                toast(e.message, 'error');
            }
        }

        function clearContract() {
            contractSessionId = '';
            contractHistory = [];
            document.getElementById('contractFile').value = '';
            document.getElementById('contractInfo').innerHTML = '';
            document.getElementById('downloadReportBtn').disabled = true;
            setContractStatus('');
            resetContractChat();
        }

        function resetContractChat() {
            contractHistory = [];
            document.getElementById('contractChat').innerHTML =
                '<div class="empty">请先上传合同，然后启动审核。</div>';
        }

        async function runContractReview() {
            if (!contractSessionId) { toast('请先上传合同', 'warning'); return; }
            const focus = document.getElementById('contractFocus').value.trim();
            const stance = document.getElementById('contractStance').value;
            const chat = document.getElementById('contractChat');
            chat.innerHTML = '<div class="empty">正在执行六阶段审核，预计需要 30-90 秒，请耐心等待...</div>';
            setContractStatus('审核中...', '#d97706');
            document.getElementById('downloadReportBtn').disabled = true;

            try {
                const res = await API.post('/api/file_review/run', {
                    session_id: contractSessionId,
                    special_focus: focus,
                    user_stance: stance
                });
                const report = res.report_full || res.report_preview || '（报告为空）';
                chat.innerHTML = `<div class="chat-msg ai"><div class="role">审核报告（共 ${res.report_length} 字）</div><pre style="white-space:pre-wrap;font-family:inherit;margin:0">${escapeHtml(report)}</pre></div>`;
                contractHistory = [];
                document.getElementById('downloadReportBtn').disabled = false;
                setContractStatus('审核完成，可下载报告或继续追问', '#16a34a');
                toast('合同审核完成', 'success');
            } catch (e) {
                setContractStatus('审核失败', '#dc2626');
                chat.innerHTML = `<div class="empty" style="color:#dc2626">审核失败：${escapeHtml(e.message)}</div>`;
                toast(e.message, 'error');
            }
        }

        function downloadReport() {
            if (!contractSessionId) { toast('无会话', 'warning'); return; }
            window.open(`/api/file_review/report/${contractSessionId}`, '_blank');
        }

        async function askContract() {
            const input = document.getElementById('contractQuestion');
            const q = input.value.trim();
            if (!q) { toast('请输入追问内容', 'warning'); return; }
            if (!contractSessionId) { toast('请先上传合同', 'warning'); return; }

            const chat = document.getElementById('contractChat');
            if (chat.querySelector('.empty')) chat.innerHTML = '';
            chat.innerHTML += `<div class="chat-msg user"><div class="role">我</div>${escapeHtml(q)}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await API.post('/api/file_review/chat', {
                    session_id: contractSessionId,
                    message: q,
                    history: contractHistory
                });
                chat.innerHTML += `<div class="chat-msg ai"><div class="role">AI 审核专家</div>${escapeHtml(res.answer)}</div>`;
                contractHistory.push({ role: 'user', content: q });
                contractHistory.push({ role: 'assistant', content: res.answer });
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        document.getElementById('contractQuestion').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') askContract();
        });
    </script>
</body>
</html>
