<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法务工作台 · 业法协同系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .field-row { margin-bottom: 10px; }
        .field-row label { display:block; font-size:13px; color:var(--text-light); margin-bottom:4px; }
        .field-row input, .field-row textarea, .field-row select {
            width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:13px;
        }
        .field-row textarea { resize:vertical; }
        .conflict-warn { background:#fff7ed; border:1px solid #fed7aa; border-radius:4px; padding:8px 12px; margin:8px 0; color:#9a3412; font-size:13px; }
        .ai-context { background:#f0f9ff; border:1px solid #bae6fd; border-radius:4px; padding:8px 12px; margin-bottom:8px; font-size:12px; }
        .ai-context strong { color:#0369a1; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">业法协同系统 <span class="sub">法务工作台</span></div>
        <div class="user-info">
            <span id="userName"></span>
            <span class="role-tag">法务</span>
            <button class="logout" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="orders">待办工单</div>
            <div class="nav-item" data-tab="kb">知识库</div>
            <div class="nav-item" data-tab="mergeConfirm">合并确认</div>
            <div class="nav-item" data-tab="reports">报告</div>
            <div class="nav-item" data-tab="archive">归档</div>
        </div>

        <div class="main">
            <!-- 待办工单 -->
            <div id="tab-orders" class="tab-pane">
                <div class="card">
                    <div class="card-title">工单列表</div>
                    <div class="toolbar">
                        <select id="statusFilter" onchange="loadOrders()">
                            <option value="">全部状态</option>
                            <option value="submitted_to_legal">待处理</option>
                            <option value="reviewing">审核中</option>
                            <option value="confirmed">已确认</option>
                            <option value="archived">已归档</option>
                        </select>
                    </div>
                    <table>
                        <thead><tr>
                            <th>工单号</th><th>提交人</th><th>提交时间</th>
                            <th>状态</th><th>材料数</th><th>操作</th>
                        </tr></thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 知识库（合并浏览+检索） -->
            <div id="tab-kb" class="tab-pane hidden">
                <div class="card">
                    <div class="card-title">知识库</div>
                    <p style="color:var(--text-light);font-size:13px;margin-bottom:12px">
                        支持关键词检索；下方展示全部条目，可点击查看详情并提交修改申请。
                    </p>
                    <div class="toolbar">
                        <input type="text" id="kbQuery" placeholder="输入关键词或问题进行智能检索"
                            style="flex:1" onkeydown="if(event.key==='Enter')kbSearch()">
                        <button class="btn" onclick="kbSearch()">智能检索</button>
                        <button class="btn btn-secondary" onclick="loadKbAll()">浏览全部</button>
                    </div>
                    <div id="kbResults" style="margin-top:12px"></div>
                    <h4 style="margin-top:24px">全部条目</h4>
                    <div class="toolbar">
                        <input type="text" id="kbAllKeyword" placeholder="按问题/标签过滤"
                            style="flex:1" onkeydown="if(event.key==='Enter')loadKbAll(true)">
                        <button class="btn btn-secondary" onclick="loadKbAll(true)">过滤</button>
                    </div>
                    <div id="kbAllList" style="margin-top:12px"></div>
                    <div id="kbAllPager" style="margin-top:12px;display:flex;gap:8px;justify-content:center;align-items:center"></div>
                </div>
            </div>

            <!-- 合并确认（法务确认管理员发起的相似合并申请） -->
            <div id="tab-mergeConfirm" class="tab-pane hidden">
                <div class="card">
                    <div class="card-title">相似合并确认</div>
                    <p style="color:var(--text-light);font-size:13px;margin-bottom:12px">
                        管理员识别的相似知识对会生成合并申请，需法务确认后才会真正合并（保留主条目、删除次条目）。
                    </p>
                    <div class="toolbar">
                        <select id="mergeReqStatus" onchange="loadMergeRequests()">
                            <option value="pending">待确认</option>
                            <option value="confirmed">已确认</option>
                            <option value="cancelled">已取消</option>
                            <option value="">全部</option>
                        </select>
                    </div>
                    <div id="mergeReqList" style="margin-top:16px"></div>
                </div>
            </div>

            <!-- 报告 -->
            <div id="tab-reports" class="tab-pane hidden">
                <div class="card">
                    <div class="card-title">报告生成</div>
                    <div class="grid-2">
                        <div>
                            <h4>月度总结</h4>
                            <div class="form-group">
                                <label>月份（YYYYMM，留空取最近）</label>
                                <input type="text" id="reportMonth" placeholder="如 202507">
                            </div>
                            <button class="btn" onclick="genMonthly()">生成月度总结</button>
                        </div>
                        <div>
                            <h4>风险扫描</h4>
                            <div class="form-group">
                                <label>扫描近 N 月</label>
                                <input type="number" id="scanMonths" value="1" min="1" max="12">
                            </div>
                            <button class="btn" onclick="genRiskScan()">扫描风险</button>
                        </div>
                    </div>
                    <div id="reportOutput" style="margin-top:16px"></div>
                </div>
            </div>

            <!-- 归档 -->
            <div id="tab-archive" class="tab-pane hidden">
                <div class="card">
                    <div class="card-title">归档工单</div>
                    <table>
                        <thead><tr>
                            <th>工单号</th><th>提交人</th><th>确认时间</th>
                            <th>审核人</th><th>操作</th>
                        </tr></thead>
                        <tbody id="archiveBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/common.js"></script>
    <script>
        let currentUser = null;
        // 当前查看工单的快照（供 AI 审核模态使用）
        let currentOrder = null;

        (async () => {
            currentUser = await requireLogin();
            if (!currentUser) return;
            if (currentUser.role !== 'legal' && currentUser.role !== 'admin') {
                redirectByRole(currentUser.role);
                return;
            }
            document.getElementById('userName').textContent = currentUser.name;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.onclick = () => switchTab(item.dataset.tab);
            });
            loadOrders();
        })();

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i =>
                i.classList.toggle('active', i.dataset.tab === tab));
            document.querySelectorAll('.tab-pane').forEach(p =>
                p.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if (tab === 'archive') loadArchive();
            if (tab === 'kb') { loadKbAll(); }
            if (tab === 'mergeConfirm') loadMergeRequests();
        }

        // ---------- 工单 ----------
        async function loadOrders() {
            const status = document.getElementById('statusFilter').value;
            const url = '/api/legal/orders' + (status ? `?status=${status}` : '');
            try {
                const orders = await API.get(url);
                const body = document.getElementById('ordersBody');
                if (!orders.length) {
                    body.innerHTML = '<tr><td colspan="6" class="empty">暂无工单</td></tr>';
                    return;
                }
                body.innerHTML = orders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>${escapeHtml(o.submitter_name || o.submitter)}</td>
                        <td>${fmtTime(o.submitted_at)}</td>
                        <td>${statusTag(o.status)}</td>
                        <td>${o.materials_count}</td>
                        <td><button class="btn btn-sm" onclick="viewOrder('${o.id}')">查看</button></td>
                    </tr>`).join('');
            } catch (e) { toast(e.message, 'error'); }
        }

        async function viewOrder(id) {
            try {
                const o = await API.get(`/api/legal/orders/${id}`);
                currentOrder = o;
                let html = `<h3>工单 ${o.id}</h3>`;
                html += `<p><strong>提交人：</strong>${escapeHtml(o.submitter_name || o.submitter)}</p>`;
                html += `<p><strong>提交时间：</strong>${fmtTime(o.submitted_at)}</p>`;
                html += `<p><strong>状态：</strong>${statusTag(o.status)}</p>`;
                if (o.reviewer_name) html += `<p><strong>法务审核人：</strong>${escapeHtml(o.reviewer_name)}</p>`;
                if (o.business_read_at) {
                    html += `<p style="color:var(--text-light);font-size:12px">业务已读时间：${fmtTime(o.business_read_at)}</p>`;
                }

                // 材料
                html += '<h4 style="margin-top:16px">提交材料</h4>';
                if (o.materials && o.materials.length) {
                    o.materials.forEach(m => {
                        html += `<div class="ref-item"><div class="ref-q">${escapeHtml(m.filename)}</div><pre style="white-space:pre-wrap;font-size:12px;max-height:200px;overflow:auto">${escapeHtml(m.content)}</pre></div>`;
                    });
                } else {
                    html += '<p class="empty">无材料</p>';
                }

                // 对话
                html += '<h4 style="margin-top:16px">咨询对话</h4>';
                o.dialogue.forEach(d => {
                    const role = { user: '业务', ai: 'AI', legal: '法务' }[d.role] || d.role;
                    const cls = d.role === 'user' ? 'user' : 'ai';
                    html += `<div class="chat-msg ${cls}"><div class="role">${role}</div>${escapeHtml(d.content)}</div>`;
                });

                // AI 结论
                if (o.ai_conclusion) {
                    html += '<h4 style="margin-top:16px">AI 综合结论</h4>';
                    html += `<div class="chat-msg ai">${escapeHtml(o.ai_conclusion)}</div>`;
                }

                // 法务结论
                html += '<h4 style="margin-top:16px">法务结论</h4>';
                html += `<textarea id="legalConclusion" rows="4" placeholder="请填写法务审核结论">${escapeHtml(o.legal_conclusion || '')}</textarea>`;

                // 入库 FAQ
                html += '<h4 style="margin-top:16px">入库 FAQ</h4>';
                html += '<div id="faqSection"></div>';

                // 操作按钮
                html += '<div class="toolbar" style="margin-top:16px">';
                if (o.status === 'submitted_to_legal' || o.status === 'reviewing') {
                    html += `<button class="btn" onclick="startReviewWithAi('${o.id}')">开始审核（AI 辅助）</button>`;
                    html += `<button class="btn btn-secondary" onclick="saveConclusion('${o.id}')">保存结论</button>`;
                    html += `<button class="btn btn-danger" onclick="confirmOrder('${o.id}')">确认完成</button>`;
                    html += `<button class="btn btn-secondary" onclick="summarizeFaq('${o.id}')">自动总结FAQ（预览）</button>`;
                }
                if (o.status === 'confirmed') {
                    const canWithdraw = !o.business_read_at;
                    const bizConfirmed = !!o.business_confirmed_at;
                    if (bizConfirmed) {
                        html += `<button class="btn" onclick="archiveWithSummary('${o.id}')">归档（自动总结入库）</button>`;
                        html += `<span style="color:#16a34a;font-size:12px;align-self:center">业务已确认</span>`;
                    } else {
                        html += `<span style="color:var(--text-light);font-size:12px;align-self:center">业务尚未确认，不可归档</span>`;
                    }
                    if (canWithdraw) {
                        html += `<button class="btn btn-danger" onclick="withdrawConfirm('${o.id}')">撤回审核</button>`;
                    } else {
                        html += `<span style="color:var(--text-light);font-size:12px;align-self:center">业务已读，无法撤回</span>`;
                    }
                }
                if (o.status === 'archived') {
                    html += `<button class="btn btn-secondary" onclick="reopenEdit('${o.id}')">重新编辑归档</button>`;
                }
                html += '</div>';

                showModal(html);
                renderFaqs(o.confirmed_faqs || []);
            } catch (e) { toast(e.message, 'error'); }
        }

        function renderFaqs(faqs) {
            const el = document.getElementById('faqSection');
            if (!faqs.length) {
                el.innerHTML = '<p class="empty">暂无入库条目</p>';
                return;
            }
            el.innerHTML = faqs.map(f =>
                `<div class="ref-item"><div class="ref-q">[${f.id}] ${escapeHtml(f.question)}</div></div>`
            ).join('');
        }

        // L2：开始审核（跳转 AI 审核页面，带上下文）
        async function startReviewWithAi(id) {
            // 先标记开始审核
            try {
                await API.post(`/api/legal/orders/${id}/review`, { action: 'start' });
            } catch (e) { /* 已在审核中也可继续 */ }

            const o = currentOrder;
            if (!o) { toast('请先查看工单', 'warning'); return; }

            // 提取上下文：业务问题、材料摘要、历史问答
            const bizQuestions = (o.dialogue || [])
                .filter(d => d.role === 'user')
                .map(d => d.content);
            const mainQuestion = bizQuestions[bizQuestions.length - 1] || '';
            const materialsText = (o.materials || [])
                .map(m => `[${m.filename}]\n${(m.content || '').slice(0, 500)}`)
                .join('\n\n');
            const historyText = (o.dialogue || [])
                .map(d => `${{user:'业务',ai:'AI',legal:'法务'}[d.role]||d.role}: ${d.content}`)
                .join('\n');

            const html = `
                <h3>AI 审核 · 工单 ${id}</h3>
                <p style="color:var(--text-light);font-size:13px;margin-bottom:8px">
                    已自动带入业务问题、材料和历史问答作为上下文，可直接调用 AI 工具辅助审核，
                    返回结果可一键填入法务结论。
                </p>
                <div class="ai-context">
                    <strong>业务主问题：</strong>${escapeHtml(mainQuestion || '（无）')}<br>
                    <strong>材料数：</strong>${(o.materials||[]).length} 份<br>
                    <strong>历史对话轮数：</strong>${(o.dialogue||[]).length}
                </div>
                <div class="field-row">
                    <label>审核问题（可修改）</label>
                    <textarea id="aiToolQuery" rows="3">${escapeHtml(mainQuestion)}</textarea>
                </div>
                <div class="field-row">
                    <label>附加上下文（已自动填入材料和历史）</label>
                    <textarea id="aiToolCtx" rows="5">${escapeHtml(materialsText + '\n\n【历史问答】\n' + historyText)}</textarea>
                </div>
                <div class="toolbar">
                    <button class="btn" onclick="callAiToolEmbedded()">调用 AI 工具</button>
                    <button class="btn btn-secondary" onclick="useAiResultAsConclusion()">填入法务结论</button>
                    <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
                </div>
                <div id="aiToolResult" style="margin-top:16px"></div>
            `;
            showModal(html);
            loadOrders();
        }

        async function callAiToolEmbedded() {
            const query = document.getElementById('aiToolQuery').value.trim();
            const ctx = document.getElementById('aiToolCtx').value.trim();
            if (!query) { toast('请输入审核问题', 'warning'); return; }
            const el = document.getElementById('aiToolResult');
            el.innerHTML = '<div class="empty">正在调用 AI...</div>';
            try {
                const res = await API.post('/api/legal/ai_tool', { query, extra_context: ctx });
                let html = `<div class="chat-msg ai"><div class="role">AI 工具</div><div style="white-space:pre-wrap">${escapeHtml(res.answer)}</div></div>`;
                if (res.mode) html += `<div style="margin-top:4px;font-size:12px;color:var(--text-light)">模式：${escapeHtml(res.mode)}</div>`;
                if (res.results && res.results.length) {
                    html += '<div style="margin-top:12px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0">';
                    html += '<div style="font-weight:600;margin-bottom:8px;color:#334155">📚 知识库参考案例（请标记是否相关）</div>';
                    res.results.forEach(r => {
                        html += `<div class="ref-item" style="margin-bottom:6px">
                            <span class="ref-score" style="background:#e8f5e9;color:#16a34a">${(r.score*100).toFixed(0)}%</span>
                            <span style="color:#2563eb;flex:1">[${r.id}] ${escapeHtml(r.question)}</span>
                            <span style="display:flex;gap:4px;flex-shrink:0">
                                <button class="btn btn-sm" onclick="feedback('${r.id}',true,this)" style="background:#e8f5e9;border-color:#16a34a;color:#16a34a">✓ 有关</button>
                                <button class="btn btn-sm" onclick="feedback('${r.id}',false,this)" style="background:#fef3c7;border-color:#d97706;color:#d97706">✗ 无关</button>
                            </span>
                        </div>`;
                    });
                    html += '</div>';
                }
                html += `<div style="margin-top:8px"><button class="btn btn-sm" onclick="useAiResultAsConclusion()">将上述回答填入法务结论</button></div>`;
                el.innerHTML = html;
                el.dataset.aiAnswer = res.answer;
            } catch (e) { toast(e.message, 'error'); el.innerHTML = ''; }
        }

        async function feedback(faqId, relevant, btn) {
            try {
                await API.post('/api/ai/feedback', { faq_id: faqId, relevant });
                toast(relevant ? '已标记为"有关"' : '已标记为"无关"', 'success');
                const parent = btn.closest('.ref-item');
                if (parent) {
                    parent.querySelectorAll('button').forEach(b => b.disabled = true);
                }
            } catch (e) { toast(e.message, 'error'); }
        }

        function useAiResultAsConclusion() {
            const el = document.getElementById('aiToolResult');
            const answer = el.dataset.aiAnswer || '';
            if (!answer) { toast('请先调用 AI 工具', 'warning'); return; }
            // 写回到外层法务结论（重新打开工单详情）
            // 当前模态是 AI 审核模态，关闭后需重新打开 viewOrder，故先暂存
            const orderId = currentOrder.id;
            const draftConclusion = answer;
            closeModal();
            // 重新打开工单详情，并预填法务结论
            (async () => {
                try {
                    const o = await API.get(`/api/legal/orders/${orderId}`);
                    currentOrder = o;
                    let html = `<h3>工单 ${o.id}</h3>`;
                    html += `<p><strong>状态：</strong>${statusTag(o.status)}</p>`;
                    html += '<h4 style="margin-top:16px">咨询对话</h4>';
                    o.dialogue.forEach(d => {
                        const role = { user: '业务', ai: 'AI', legal: '法务' }[d.role] || d.role;
                        const cls = d.role === 'user' ? 'user' : 'ai';
                        html += `<div class="chat-msg ${cls}"><div class="role">${role}</div>${escapeHtml(d.content)}</div>`;
                    });
                    html += '<h4 style="margin-top:16px">法务结论</h4>';
                    html += `<textarea id="legalConclusion" rows="6">${escapeHtml(draftConclusion)}</textarea>`;
                    html += '<div class="toolbar" style="margin-top:16px">';
                    html += `<button class="btn btn-secondary" onclick="saveConclusion('${o.id}')">保存结论</button>`;
                    html += `<button class="btn btn-danger" onclick="confirmOrder('${o.id}')">确认完成</button>`;
                    html += `<button class="btn btn-secondary" onclick="summarizeFaq('${o.id}')">自动总结FAQ（预览）</button>`;
                    html += '</div>';
                    showModal(html);
                } catch (e) { toast(e.message, 'error'); }
            })();
        }

        async function saveConclusion(id) {
            const text = document.getElementById('legalConclusion').value;
            try {
                await API.post(`/api/legal/orders/${id}/review`, { action: 'save', conclusion: text });
                toast('结论已保存');
                loadOrders();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function confirmOrder(id) {
            const conclusion = document.getElementById('legalConclusion').value;
            if (!conclusion.trim()) { toast('请先填写法务结论', 'warning'); return; }
            if (!confirm('确认完成本工单？确认后状态将变为"已确认"，业务未读前仍可撤回。')) return;
            try {
                await API.post(`/api/legal/orders/${id}/confirm`, { conclusion });
                toast('工单已确认');
                closeModal();
                loadOrders();
            } catch (e) { toast(e.message, 'error'); }
        }

        // L3：撤回已确认审核（业务未读前）
        async function withdrawConfirm(id) {
            if (!confirm('确认撤回审核？工单将回到"审核中"状态。业务已读后无法撤回。')) return;
            try {
                await API.post(`/api/legal/orders/${id}/withdraw_confirm`);
                toast('已撤回审核', 'success');
                closeModal();
                loadOrders();
            } catch (e) { toast(e.message, 'error'); }
        }

        // L4：归档（先自动总结 KB 条目，法务决定是否提交入库，管理员确认后入库）
        async function archiveWithSummary(id) {
            if (!confirm('归档前将调用 LLM 自动总结 FAQ 条目，并检测与历史答复冲突。继续？')) return;
            try {
                // 1. 调用 prepare_archive 获取 LLM 总结草稿 + 冲突检测
                const prep = await API.post(`/api/legal/orders/${id}/prepare_archive`);
                showArchiveSummaryModal(id, prep);
            } catch (e) { toast(e.message, 'error'); }
        }

        function showArchiveSummaryModal(orderId, prep) {
            const f = prep.faq || {};
            let html = `<h3>归档 · 工单 ${orderId}</h3>`;
            html += '<p style="color:var(--text-light);font-size:13px;margin-bottom:8px">'
                + 'LLM 已基于咨询对话与法务结论自动总结 FAQ 草稿，请审核修改后决定是否提交入库。'
                + '提交后需管理员确认才能正式入库。</p>';

            if (prep.has_conflict) {
                html += '<div class="conflict-warn">⚠ 检测到与历史答复相似条目，请人工确认是否冲突：</div>';
                prep.conflicts.forEach(c => {
                    html += `<div class="ref-item" style="border-left:3px solid #c0392b">
                        <span class="ref-score">${(c.score*100).toFixed(0)}%</span>

        async function submitEditRequest(id, originalJson) {
            const reason = document.getElementById('erReason').value.trim();
            if (!reason) { toast('请填写修改原因', 'warning'); return; }

            const original = JSON.parse(originalJson);
            const fields = {};
            // 仅收集与原值不同的字段
            const checks = [
                ['question', 'erQuestion'],
                ['legal_answer', 'erLegalAnswer'],
                ['compliance_risk', 'erRisk'],
                ['practical_advice', 'erAdvice'],
                ['legal_basis', 'erBasis'],
                ['category', 'erCategory'],
            ];
            for (const [field, elId] of checks) {
                const newVal = document.getElementById(elId).value;
                if (newVal !== (original[field] || '')) {
                    fields[field] = newVal;
                }
            }
            // 标签单独处理
            const newTags = (document.getElementById('erTags').value || '')
                .split(',').map(s => s.trim()).filter(Boolean);
            const origTags = original.tags || [];
            if (JSON.stringify(newTags) !== JSON.stringify(origTags)) {
                fields.tags = newTags;
            }

            if (!Object.keys(fields).length) {
                toast('未修改任何字段', 'warning');
                return;
            }

            try {
                const res = await API.post(`/api/legal/kb/items/${id}/edit_request`, {
                    fields, reason
                });
                toast(`已提交申请：${res.request_id}`, 'success');
                closeModal();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function genRiskScan() {
            const months = parseInt(document.getElementById('scanMonths').value || '1');
            const el = document.getElementById('reportOutput');
            el.innerHTML = '<div class="empty">扫描中...</div>';
            try {
                const res = await API.post('/api/report/risk_scan', { months });
                const risks = res.risk_items || res.risks || [];
                const monthsLabel = (res.scanned_months || []).join(', ');
                let html = `<div class="chat-msg ai"><div class="role">风险扫描（${monthsLabel} · 命中 ${risks.length} 条，共扫描 ${res.total_recent||0} 条）</div>`;
                if (risks.length) {
                    // 关键词统计
                    if (res.keyword_breakdown) {
                        const kws = Object.entries(res.keyword_breakdown)
                            .map(([k, v]) => `<span class="tag">${escapeHtml(k)}×${v}</span>`).join('');
                        if (kws) html += `<div style="margin-bottom:8px">${kws}</div>`;
                    }
                    risks.forEach(r => {
                        const kws = (r.hit_keywords || []).map(k => `<span class="tag">${escapeHtml(k)}</span>`).join('');
                        html += `<div class="ref-item"><div class="ref-q">[${r.id}] ${escapeHtml(r.question)}</div><div style="font-size:12px;color:var(--text-light);margin-top:4px">${escapeHtml(r.compliance_risk || '')}</div><div style="margin-top:4px">${kws}</div></div>`;
                    });
                } else {
                    html += '<p class="empty">无风险命中</p>';
                }
                html += '</div>';
                el.innerHTML = html;
            } catch (e) { toast(e.message, 'error'); el.innerHTML = ''; }
        }

        // ---------- 归档列表 ----------
        async function loadArchive() {
            try {
                const orders = await API.get('/api/legal/orders?status=archived');
                const body = document.getElementById('archiveBody');
                if (!orders.length) {
                    body.innerHTML = '<tr><td colspan="5" class="empty">无归档工单</td></tr>';
                    return;
                }
                body.innerHTML = orders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>${escapeHtml(o.submitter_name || o.submitter)}</td>
                        <td>${fmtTime(o.confirmed_at || o.submitted_at)}</td>
                        <td>${escapeHtml(o.reviewer_name || '-')}</td>
                        <td><button class="btn btn-sm" onclick="viewOrder('${o.id}')">查看</button></td>
                    </tr>`).join('');
            } catch (e) { toast(e.message, 'error'); }
        }

        // 通用模态框
        function showModal(html) {
            let mask = document.querySelector('.modal-mask');
            if (mask) mask.remove();
            mask = document.createElement('div');
            mask.className = 'modal-mask';
            mask.innerHTML = `<div class="modal">${html}</div>`;
            mask.onclick = e => { if (e.target === mask) mask.remove(); };
            document.body.appendChild(mask);
        }
        function closeModal() {
            const mask = document.querySelector('.modal-mask');
            if (mask) mask.remove();
        }
    </script>
</body>
</html>
